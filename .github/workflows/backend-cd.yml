name: Backend CD - ppiyaki

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to NCP Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.NCP_REGISTRY }}
          username: ${{ secrets.NCP_ACCESS_KEY }}
          password: ${{ secrets.NCP_SECRET_KEY }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ secrets.NCP_REGISTRY }}/ppiyaki-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: SSH Remote Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_IP }}
          username: ${{ secrets.REMOTE_USER }}
          password: ${{ secrets.REMOTE_PASSWORD }}
          port: 22
          script: |
            docker login ${{ secrets.NCP_REGISTRY }} -u ${{ secrets.NCP_ACCESS_KEY }} -p ${{ secrets.NCP_SECRET_KEY }}
            
            echo "Stopping and removing old container..."
            docker stop ppiyaki-server || true
            docker rm ppiyaki-server || true
            
            echo "Pulling latest image..."
            docker pull ${{ secrets.NCP_REGISTRY }}/ppiyaki-server:latest
            
            echo "Starting new container..."
            docker run -d \
              --name ppiyaki-server \
              -p 8080:8080 \
              --restart always \
              -e SPRING_PROFILES_ACTIVE=prod \
              -e DB_URL='${{ secrets.DB_URL }}' \
              -e DB_USERNAME='${{ secrets.DB_USERNAME }}' \
              -e DB_PASSWORD='${{ secrets.DB_PASSWORD }}' \
              -e JPA_DDL_AUTO='${{ secrets.JPA_DDL_AUTO }}' \
              -e JWT_SECRET='${{ secrets.JWT_SECRET }}' \
              -e KAKAO_OIDC_AUDIENCE='${{ secrets.KAKAO_OIDC_AUDIENCE }}' \
              -e NCP_STORAGE_ENDPOINT='${{ secrets.NCP_STORAGE_ENDPOINT }}' \
              -e NCP_STORAGE_REGION='${{ secrets.NCP_STORAGE_REGION }}' \
              -e NCP_STORAGE_ACCESS_KEY='${{ secrets.NCP_STORAGE_ACCESS_KEY }}' \
              -e NCP_STORAGE_SECRET_KEY='${{ secrets.NCP_STORAGE_SECRET_KEY }}' \
              -e NCP_STORAGE_BUCKET_NAME='${{ secrets.NCP_STORAGE_BUCKET_NAME }}' \
              ${{ secrets.NCP_REGISTRY }}/ppiyaki-server:latest
            
            echo "Cleaning up old images..."
            docker image prune -f

      - name: Discord Notification
        uses: sarisia/actions-status-discord@v1
        if: always()
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: ${{ job.status }}
          content: "🚀 **ppiyaki-server** 배포 결과"
          title: "Backend Deployment"
          description: "배포 상태: ${{ job.status }}\n커밋 메시지: ${{ github.event.head_commit.message }}"
          username: "삐약이🐥"

