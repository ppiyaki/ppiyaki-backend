version: 2
updates:
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 5
    labels:
      - "type:chore"
      - "scope:infra"
      - "needs-human-review"
    commit-message:
      prefix: "chore(infra)"
      include: "scope"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 3
    labels:
      - "type:chore"
      - "scope:infra"
      - "needs-human-review"
    commit-message:
      prefix: "chore(infra)"
      include: "scope"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 3
    labels:
      - "type:chore"
      - "scope:infra"
      - "needs-human-review"
    commit-message:
      prefix: "chore(infra)"
      include: "scope"
