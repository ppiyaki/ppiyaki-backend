spring:
  application:
    name: ppiyaki-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:default}
  datasource:
    url: jdbc:h2:mem:ppiyaki;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: never
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

jwt:
  secret: ${JWT_SECRET:local-dev-secret-key-must-be-at-least-32-bytes-long}
  access-token-expiry: ${JWT_ACCESS_EXPIRY:1800000}
  refresh-token-expiry: ${JWT_REFRESH_EXPIRY:1209600000}

kakao:
  oidc:
    issuer: ${KAKAO_OIDC_ISSUER:https://kauth.kakao.com}
    jwks-uri: ${KAKAO_OIDC_JWKS_URI:https://kauth.kakao.com/.well-known/jwks.json}
    audience: ${KAKAO_OIDC_AUDIENCE:local-kakao-app-key}

mfds:
  api:
    base-url: apis.data.go.kr/1471000/DURPrdlstInfoService03
    connect-timeout: 2000
    read-timeout: 5000
